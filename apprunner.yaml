version: 1.0
runtime: python311

build:
  commands:
    - pip install --upgrade pip
    - pip install -r requirements.txt

run:
  command: python main.py
  network:
    port: 8080
  env:
    - name: GRADIO_SERVER_NAME
      value: "0.0.0.0"
    - name: GRADIO_SERVER_PORT
      value: "8080"
    - name: PYTHONUNBUFFERED
      value: "1"